<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0f0f14">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Biblioteca">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <title>Biblioteca — Entrar</title>
  <link rel="stylesheet" href="css/style.css">
  <script>
    const t = sessionStorage.getItem('bib_token');
    const e = sessionStorage.getItem('bib_expiry');
    if (t && e && new Date() < new Date(e)) window.location.href = 'pages/dashboard.html';
  </script>
</head>
<body> 
  <div class="login-page">
    <div class="login-card">
      <div class="login-logo">
        <div class="mark">📚</div>
        <h1>Biblioteca</h1>
        <p>Sistema de gestão de biblioteca</p>
      </div>
      <div id="login-error" class="alert alert-danger" style="display:none"></div>
      <form onsubmit="doLogin(event)">
        <div class="form-group" style="margin-bottom:.85rem">
          <label for="username">Utilizador</label>
          <input type="text" id="username" autofocus required placeholder="admin">
        </div>
        <div class="form-group" style="margin-bottom:1.25rem">
          <label for="password">Palavra-passe</label>
          <input type="password" id="password" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn btn-primary" id="loginBtn" style="width:100%;justify-content:center;padding:.75rem">
          <span id="btnText">Entrar</span>
        </button>
      </form>
    </div>
  </div>
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script>
    async function doLogin(e) {
      e.preventDefault();
      const errEl = document.getElementById('login-error');
      const btn   = document.getElementById('loginBtn');
      errEl.style.display = 'none';
      btn.disabled = true;
      document.getElementById('btnText').textContent = 'A entrar...';
      try {
        await Auth.login(
          document.getElementById('username').value,
          document.getElementById('password').value
        );
        window.location.href = 'pages/dashboard.html';
      } catch(err) {
        errEl.textContent   = err.message;
        errEl.style.display = 'flex';
        btn.disabled = false;
        document.getElementById('btnText').textContent = 'Entrar';
      }
    }
  </script>
</body>
  
</html>
